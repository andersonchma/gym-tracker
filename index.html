<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM TRACKER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #E24B4A;
    --accent2: #378ADD;
    --bg: #ffffff;
    --surface: #f5f5f3;
    --border: rgba(0,0,0,0.12);
    --text: #1a1a1a;
    --muted: #666;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #252525;
      --border: rgba(255,255,255,0.12);
      --text: #f0f0f0;
      --muted: #999;
    }
  }
  body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }
  h1 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 28px; font-weight: 400; }
  .app { padding: 1.5rem; max-width: 680px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .badge { background: #E24B4A; color: #fff; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; letter-spacing: 1px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); }
  .tab { padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; transition: all .2s; font-family: 'DM Sans', sans-serif; }
  .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .section { display: none; } .section.active { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
  input, select { width: 100%; padding: 10px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif;
    background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
  input:focus, select:focus { border-color: var(--accent2); }
  .btn-add { width: 100%; padding: 12px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 4px; letter-spacing: .5px; transition: opacity .2s; }
  .btn-add:hover { opacity: .85; }
  .btn-add:disabled { background: var(--muted); cursor: not-allowed; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border-radius: 8px; padding: 14px 12px; text-align: center; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 1px; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: .5px; }
  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .log-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .log-info { flex: 1; min-width: 0; }
  .log-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .log-right { text-align: right; flex-shrink: 0; }
  .log-weight { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .5px; }
  .log-unit { font-size: 11px; color: var(--muted); }
  .pr-badge { font-size: 10px; background: #FAECE7; color: #993C1D; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .empty { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 14px; }
  .delete-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 4px; border-radius: 4px; line-height: 1; opacity: .5; transition: opacity .2s; }
  .delete-btn:hover { opacity: 1; color: var(--accent); }
  .chart-wrap { background: var(--surface); border-radius: 10px; padding: 14px; margin-bottom: 1rem; }
  .chart-title { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: .5px; margin-bottom: 10px; }
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .bar-label { width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 18px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; display: flex; align-items: center; padding-left: 6px; }
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-top: 8px; }
  .day-cell { aspect-ratio: 1; border-radius: 3px; background: var(--border); }
  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); border-radius: 20px; background: none; cursor: pointer; color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .filter-btn.active { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>GYM TRACKER</h1>
    <span class="badge">PRO</span>
  </div>
 
  <div class="tabs">
    <button class="tab active" onclick="switchTab('registro', this)">Registrar</button>
    <button class="tab" onclick="switchTab('historial', this)">Historial</button>
    <button class="tab" onclick="switchTab('stats', this)">Estadísticas</button>
  </div>
 
  <div id="sec-registro" class="section active">
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Tu Nombre / Perfil</label>
        <input type="text" id="ej-usuario" placeholder="Escribe tu nombre..." oninput="actualizarVistas()">
      </div>

      <div class="form-group" style="grid-column:1/-1">
        <label>Ejercicio</label>
        <select id="ej-tipo" name="ejercicio">
          <option value="">Seleccionar ejercicio...</option>
          <optgroup label="Pecho"><option>Press banca</option><option>Press inclinado</option><option>Aperturas</option><option>Fondos</option></optgroup>
          <optgroup label="Espalda"><option>Peso muerto</option><option>Jalón al pecho</option><option>Remo con barra</option><option>Dominadas</option></optgroup>
          <optgroup label="Hombros"><option>Press militar</option><option>Elevaciones laterales</option><option>Pájaros</option></optgroup>
          <optgroup label="Piernas"><option>Sentadilla</option><option>Prensa</option><option>Extensiones</option><option>Curl femoral</option><option>Peso muerto rumano</option></optgroup>
          <optgroup label="Brazos"><option>Curl bíceps</option><option>Press francés</option><option>Martillo</option><option>Triceps polea</option></optgroup>
          <option value="__custom">Otro (escribir)</option>
        </select>
      </div>
      <div class="form-group" id="custom-wrap" style="display:none;grid-column:1/-1">
        <label>Nombre del ejercicio</label>
        <input type="text" id="ej-custom" placeholder="Ej: Hip thrust">
      </div>
      <div class="form-group">
        <label>Peso (kg)</label>
        <input type="number" id="ej-peso" name="peso" placeholder="0.0" min="0" step="0.5">
      </div>
      <div class="form-group">
        <label>Repeticiones</label>
        <input type="number" id="ej-reps" name="reps" placeholder="0" min="1" step="1">
      </div>
      <div class="form-group">
        <label>Series</label>
        <input type="number" id="ej-series" name="series" placeholder="1" min="1" step="1" value="1">
      </div>
      <div class="form-group">
        <label>Grupo muscular</label>
        <select id="ej-grupo" name="grupo">
          <option>Pecho</option><option>Espalda</option><option>Hombros</option>
          <option>Piernas</option><option>Brazos</option><option>Core</option><option>Cardio</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Notas (opcional)</label>
        <input type="text" id="ej-notas" name="notas" placeholder="Ej: con agarre cerrado, fatiga al final...">
      </div>
    </div>
    <button id="btn-submit" class="btn-add" onclick="agregarEjercicio()">+ Registrar ejercicio</button>
    <div id="feedback" style="margin-top:10px;font-size:13px;text-align:center;min-height:20px;color:var(--muted)"></div>
  </div>
 
  <div id="sec-historial" class="section">
    <div class="filter-row" id="filtros-historial">
      <button class="filter-btn active" onclick="filtrar('Todos',this)">Todos</button>
      <button class="filter-btn" onclick="filtrar('Pecho',this)">Pecho</button>
      <button class="filter-btn" onclick="filtrar('Espalda',this)">Espalda</button>
      <button class="filter-btn" onclick="filtrar('Piernas',this)">Piernas</button>
      <button class="filter-btn" onclick="filtrar('Hombros',this)">Hombros</button>
      <button class="filter-btn" onclick="filtrar('Brazos',this)">Brazos</button>
    </div>
    <div class="log-list" id="log-list"></div>
  </div>
 
  <div id="sec-stats" class="section">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="s-total" style="color:var(--accent)">0</div><div class="stat-lbl">ejercicios totales</div></div>
      <div class="stat-card"><div class="stat-val" id="s-vol" style="color:var(--accent2)">0</div><div class="stat-lbl">kg volumen total</div></div>
      <div class="stat-card"><div class="stat-val" id="s-pr" style="color:#1D9E75">0</div><div class="stat-lbl">récords personales</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">VOLUMEN POR GRUPO MUSCULAR</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">ACTIVIDAD ÚLTIMOS 21 DÍAS</div>
      <div class="day-grid" id="day-grid"></div>
    </div>
  </div>
</div>
 
<script>
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxxtiLAMhiHcKLHMphpRuiFXGTMCBL8C4dQZxTfi3IQZtlEj_jZ4lCGnPlPLTFXyPBB/exec";
  const ICONS = {Pecho:'💪',Espalda:'🔙',Hombros:'🔺',Piernas:'🦵',Brazos:'💪',Core:'⭕',Cardio:'🏃'};
  const COLORS = {Pecho:'#E24B4A',Espalda:'#378ADD',Hombros:'#EF9F27',Piernas:'#1D9E75',Brazos:'#D4537E',Core:'#7F77DD',Cardio:'#5DCAA5'};
  
  let records = JSON.parse(localStorage.getItem('gymData')||'[]');
  let filtroActivo = 'Todos';

  // Al cargar la página, recuperar el último nombre usado
  window.onload = () => {
    const ultimoUsuario = localStorage.getItem('lastUser') || 'Mi Perfil';
    document.getElementById('ej-usuario').value = ultimoUsuario;
    actualizarVistas();
  };

  function actualizarVistas() {
    const user = document.getElementById('ej-usuario').value.trim();
    localStorage.setItem('lastUser', user); // Guardar nombre actual para la próxima vez
    renderHistorial();
    renderStats();
  }
 
  document.getElementById('ej-tipo').addEventListener('change', function(){
    document.getElementById('custom-wrap').style.display = this.value==='__custom' ? 'block' : 'none';
    if(this.value && this.value!=='__custom'){
      const grupoMap = {
        'Press banca':'Pecho','Press inclinado':'Pecho','Aperturas':'Pecho','Fondos':'Pecho',
        'Peso muerto':'Espalda','Jalón al pecho':'Espalda','Remo con barra':'Espalda','Dominadas':'Espalda',
        'Press militar':'Hombros','Elevaciones laterales':'Hombros','Pájaros':'Hombros',
        'Sentadilla':'Piernas','Prensa':'Piernas','Extensiones':'Piernas','Curl femoral':'Piernas','Peso muerto rumano':'Piernas',
        'Curl bíceps':'Brazos','Press francés':'Brazos','Martillo':'Brazos','Triceps polea':'Brazos'
      };
      const g = grupoMap[this.value];
      if(g) document.getElementById('ej-grupo').value = g;
    }
  });

  function switchTab(t, btn){
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-'+t).classList.add('active');
    actualizarVistas();
  }
 
  function getEjNombre(){
    const sel = document.getElementById('ej-tipo').value;
    return sel==='__custom' ? document.getElementById('ej-custom').value.trim() : sel;
  }
 
  async function agregarEjercicio(){
    const usuario = document.getElementById('ej-usuario').value.trim() || "Anónimo";
    const nombre = getEjNombre();
    const peso = parseFloat(document.getElementById('ej-peso').value)||0;
    const reps = parseInt(document.getElementById('ej-reps').value)||0;
    const series = parseInt(document.getElementById('ej-series').value)||1;
    const grupo = document.getElementById('ej-grupo').value;
    const notas = document.getElementById('ej-notas').value.trim();
    const fb = document.getElementById('feedback');
    const btn = document.getElementById('btn-submit');
 
    if(!nombre){fb.textContent='Selecciona o escribe un ejercicio';fb.style.color='#E24B4A';return}
    if(reps<1){fb.textContent='Ingresa las repeticiones';fb.style.color='#E24B4A';return}
 
    const now = new Date();
    const entry = {
      id: Date.now(),
      usuario, 
      nombre,
      peso,
      reps,
      series,
      grupo,
      notas,
      fecha: now.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'2-digit'}),
      ts: now.getTime()
    };
 
    const prAntes = getPR(nombre, usuario);
    records.unshift(entry);
    guardar();
    
    btn.disabled = true;
    btn.textContent = "Enviando a Drive...";
    
    const formData = new FormData();
    formData.append('usuario', usuario);
    formData.append('ejercicio', nombre);
    formData.append('peso', peso);
    formData.append('reps', reps);
    formData.append('series', series);
    formData.append('grupo', grupo);
    formData.append('notas', notas);

    try {
      await fetch(URL_SCRIPT, { method: 'POST', body: formData, mode: 'no-cors' });
      const esNuevoPR = peso > 0 && peso > prAntes;
      fb.textContent = esNuevoPR ? '¡Nuevo PR y guardado en Drive! 🏆' : 'Registrado en Drive ✓';
      fb.style.color = esNuevoPR ? '#1D9E75' : '#378ADD';
    } catch (error) {
      fb.textContent = 'Error al conectar con Drive, pero se guardó local.';
      fb.style.color = '#E24B4A';
    }

    btn.disabled = false;
    btn.textContent = "+ Registrar ejercicio";
 
    // Limpiamos todo MENOS el usuario para que puedas seguir registrando con el mismo nombre
    document.getElementById('ej-tipo').value='';
    document.getElementById('ej-custom').value='';
    document.getElementById('custom-wrap').style.display='none';
    document.getElementById('ej-peso').value='';
    document.getElementById('ej-reps').value='';
    document.getElementById('ej-series').value='1';
    document.getElementById('ej-notas').value='';
    setTimeout(()=>{fb.textContent=''},4000);
    actualizarVistas();
  }
 
  function getPR(nombre, usuario){
    const filtered = records.filter(r => r.nombre === nombre && r.usuario === usuario && r.peso > 0);
    return filtered.length > 0 ? Math.max(...filtered.map(r => r.peso)) : 0;
  }
 
  function isPR(entry){
    const others = records.filter(r => 
      r.nombre === entry.nombre && 
      r.usuario === entry.usuario && 
      r.peso > 0 && 
      r.ts !== entry.ts && 
      r.ts > entry.ts
    );
    return entry.peso > 0 && others.length === 0 && getPR(entry.nombre, entry.usuario) === entry.peso;
  }
 
  function guardar(){
    try{localStorage.setItem('gymData',JSON.stringify(records))}catch(e){}
  }
 
  function filtrar(g, btn){
    filtroActivo=g;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderHistorial();
  }
 
  function renderHistorial(){
    const list = document.getElementById('log-list');
    if(!list) return;
    const usuarioActual = document.getElementById('ej-usuario').value.trim();
    
    let data = records.filter(r => r.usuario === usuarioActual);
    if(filtroActivo !== 'Todos') data = data.filter(r => r.grupo === filtroActivo);

    if(!data.length){
      list.innerHTML=`<div class="empty">Sin registros para "${usuarioActual}".<br><small>Escribe otro nombre para ver sus datos.</small></div>`;
      return;
    }
    
    list.innerHTML = data.map(r=>`
      <div class="log-item">
        <div class="log-icon" style="background:${COLORS[r.grupo]||'#888'}22">${ICONS[r.grupo]||'⚡'}</div>
        <div class="log-info">
          <div class="log-name">${r.nombre}</div>
          <div class="log-meta">${r.fecha} · ${r.series} serie${r.series>1?'s':''} × ${r.reps} reps${r.notas?' · <em>'+r.notas+'</em>':''}</div>
        </div>
        <div class="log-right">
          <div class="log-weight" style="color:${COLORS[r.grupo]||'var(--text)'}">${r.peso||'—'}</div>
          <div class="log-unit">kg</div>
          ${isPR(r)?'<div class="pr-badge">PR</div>':''}
        </div>
        <button class="delete-btn" onclick="borrar(${r.id})" title="Eliminar">×</button>
      </div>`).join('');
  }
 
  function borrar(id){
    records=records.filter(r=>r.id!==id);
    guardar();
    actualizarVistas();
  }
 
  function renderStats(){
    const usuarioActual = document.getElementById('ej-usuario').value.trim();
    const userRecords = records.filter(r => r.usuario === usuarioActual);

    document.getElementById('s-total').textContent = userRecords.length;
    const vol = userRecords.reduce((a,r)=>a+(r.peso*r.reps*r.series),0);
    document.getElementById('s-vol').textContent = vol>=1000?(vol/1000).toFixed(1)+'k':Math.round(vol);
 
    const grupos = {};
    userRecords.forEach(r=>{grupos[r.grupo]=(grupos[r.grupo]||0)+(r.peso*r.reps*r.series)});
    const prCount = [...new Set(userRecords.map(r=>r.nombre))].filter(n=>userRecords.some(r=>r.nombre===n&&r.peso>0)).length;
    document.getElementById('s-pr').textContent = prCount;
 
    const bars = document.getElementById('bar-chart');
    if(!bars) return;
    const sorted = Object.entries(grupos).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length){bars.innerHTML='<div style="font-size:13px;color:var(--muted);text-align:center;padding:1rem">Sin datos aún</div>';}
    else {
      const max = sorted[0][1];
      bars.innerHTML = sorted.map(([g,v])=>`
        <div class="bar-row">
          <div class="bar-label">${g}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${COLORS[g]||'#888'}">
              <span style="color:#fff;font-size:10px;font-weight:500">${v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)} kg</span>
            </div>
          </div>
        </div>`).join('');
    }
 
    const grid = document.getElementById('day-grid');
    if(!grid) return;
    const today = Date.now();
    const cells = Array.from({length:21},(_,i)=>{
      const d = new Date(today - (20-i)*86400000);
      d.setHours(0,0,0,0);
      const next = new Date(d); next.setDate(next.getDate()+1);
      const count = userRecords.filter(r=>r.ts>=d.getTime()&&r.ts<next.getTime()).length;
      const opacity = count===0 ? 0.08 : Math.min(0.2+count*0.25,1);
      const color = count===0 ? 'var(--border)' : `rgba(227,75,74,${opacity})`;
      return `<div class="day-cell" style="background:${color}" title="${d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'})}: ${count} ejercicios"></div>`;
    });
    grid.innerHTML = cells.join('');
  }
</script>
</body>
</html>
